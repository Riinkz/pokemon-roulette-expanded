<div class="row">
    <div class="col-12 col-sm-2">
      <div class="row py-4">
            <div class="col-6 col-sm-12 mb-2">
                <app-main-game-button></app-main-game-button>
            </div>
      </div>
    </div>
    <div class="col-12 col-sm-9">
        <div class="container text-center">
            <div class="mt-2 mb-4">
                <h3>
                    <ng-icon name="bootstrapGear" (click)="onHeaderClick()" style="cursor: default;"></ng-icon> {{ 'settings.label' | translate }} <ng-icon name="bootstrapGear"></ng-icon>
                </h3>
            </div>
            <div class="d-flex justify-content-center">
                <div class="row g-3" style="max-width: 500px;">
                    <div class="col-12">
                        <app-dark-mode-toggle></app-dark-mode-toggle>
                    </div>
                    <div class="col-12">
                        <div class="form-switch d-flex justify-content-between">
                            <label class="form-check-label" for="explanationsSwitch">
                                {{ 'settings.explanations' | translate }}
                            </label>
                            <input 
                                class="form-check-input" 
                                type="checkbox" 
                                [checked]="(settings$ | async)?.lessExplanations" 
                                (change)="onToggleVerbosity()"
                                id="explanationsSwitch">
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-switch d-flex justify-content-between">
                            <label class="form-check-label" for="muteAudioSwitch">
                                {{ 'settings.muteAudio' | translate }}
                            </label>
                            <input
                                class="form-check-input"
                                type="checkbox"
                                [checked]="(settings$ | async)?.muteAudio"
                                (change)="onToggleMuteAudio()"
                                id="muteAudioSwitch">
                        </div>
                        <div class="d-flex align-items-center gap-2 mt-2">
                            <small>Volume</small>
                            <input type="range" class="form-range flex-grow-1" min="0" max="100" step="5"
                                [value]="(settings$ | async)?.audioVolume"
                                (input)="onVolumeChange($event)">
                            <small style="min-width: 30px">{{ (settings$ | async)?.audioVolume }}%</small>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-switch d-flex justify-content-between">
                            <label class="form-check-label" for="skipShinySwitch">
                                {{ 'settings.skipShinyRolls' | translate }}
                            </label>
                            <input 
                                class="form-check-input" 
                                type="checkbox" 
                                [checked]="(settings$ | async)?.skipShinyRolls" 
                                (change)="onToggleSkipShinyRolls()"
                                id="skipShinySwitch">
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="d-flex justify-content-between align-items-center">
                            <label>{{ 'settings.gender' | translate }}</label>
                            <select class="form-select form-select-sm" style="width: auto"
                                [value]="(settings$ | async)?.gender"
                                (change)="onGenderChange($event)">
                                <option value="">{{ 'settings.genderAsk' | translate }}</option>
                                <option value="male">{{ 'game.main.roulette.character.boy' | translate }}</option>
                                <option value="female">{{ 'game.main.roulette.character.girl' | translate }}</option>
                            </select>
                        </div>
                    </div>
                    <div class="col-12">
                        <app-language-selector></app-language-selector>
                    </div>
                    <div class="col-12 mt-3">
                        <hr>
                        <h5>Save Data</h5>
                        <div class="d-flex gap-2 justify-content-center">
                            <button class="btn btn-outline-primary btn-sm" (click)="exportSave()">Export Save</button>
                            <button class="btn btn-outline-secondary btn-sm" (click)="importSave()">Import Save</button>
                        </div>
                        <input type="file" #fileInput accept=".txt" style="display:none" (change)="onFileSelected($event)">
                        <div class="mt-2">
                            @if (!confirmDelete) {
                                <button class="btn btn-outline-danger btn-sm" (click)="confirmDelete = true">Delete Save Data</button>
                            } @else {
                                <span class="me-2">Are you sure?</span>
                                <button class="btn btn-danger btn-sm me-1" (click)="deleteSaveData()">Yes, delete everything</button>
                                <button class="btn btn-outline-secondary btn-sm" (click)="confirmDelete = false">Cancel</button>
                            }
                        </div>
                    </div>
                    <div class="col-12 mt-3">
                        <hr>
                        <button class="btn btn-outline-info btn-sm" (click)="goToStats()">View Battle Stats</button>
                    </div>
                    @if (devMode) {
                    <div class="col-12 mt-3">
                        <hr>
                        <h5 class="text-warning">Dev Mode Active</h5>
                        <small class="text-muted">Click the gear icon again to disable</small>
                    </div>
                    }
                </div>
            </div>
        </div>
    </div>
  </div>
