<div class="trainer-team-box rounded-3 p-3 m-3 row gap-3"
     [ngClass]="(darkMode | async) ? 'border white-shadow' : 'black-border shadow'">
    <div class="container" >
          <div class="row gap-2">
               <div class="trainer-sprite rounded-3 col-3"
                    [ngClass]="(darkMode | async) ? 'border white-shadow' : 'black-border shadow'">
                    <img [src]="trainer.sprite" alt="Trainer Sprite" class="img-fluid">
               </div>
               <app-badges
                    class="col-8"
                    [trainerBadges]="trainerBadges">
               </app-badges>
          </div>
    </div>
    <div class="container">
          <div class="row gap-2">
               <div class="row col-12 gap-2 p-0">
                    <div class="pokemon-container rounded-3 col-3"
                         [ngClass]="(darkMode | async) ? 'border' : 'black-border shadow'">
                         @if (trainerTeam[0]?.sprite) {
                              <img [src]="getSprite(trainerTeam[0])"
                                   class="img-fluid"
                                   placement="bottom"
                                   ngbTooltip="{{trainerTeam[0].text | translate }}">
                         }
                    </div>
                    <div class="pokemon-container rounded-3 col-3"
                         [ngClass]="(darkMode | async) ? 'border' : 'black-border shadow'">
                         @if (trainerTeam[1]?.sprite) {
                              <img [src]="getSprite(trainerTeam[1])"
                                   class="img-fluid"
                                   placement="bottom"
                                   ngbTooltip="{{trainerTeam[1].text | translate }}">
                         }
                    </div>
                    <div class="pokemon-container rounded-3 col-3"
                         [ngClass]="(darkMode | async) ? 'border' : 'black-border shadow'">
                         @if (trainerTeam[2]?.sprite) {
                              <img [src]="getSprite(trainerTeam[2])"
                                   class="img-fluid"
                                   placement="bottom"
                                   ngbTooltip="{{trainerTeam[2].text | translate }}">
                         }
                    </div>
                    <div class="pokemon-container rounded-3 col-3"
                         [ngClass]="(darkMode | async) ? 'border' : 'black-border shadow'">
                         @if (trainerTeam[3]?.sprite) {
                              <img [src]="getSprite(trainerTeam[3])"
                                   class="img-fluid"
                                   placement="bottom"
                                   ngbTooltip="{{trainerTeam[3].text | translate }}">
                         }
                    </div>
                    <div class="pokemon-container rounded-3 col-3"
                         [ngClass]="(darkMode | async) ? 'border' : 'black-border shadow'">
                         @if (trainerTeam[4]?.sprite) {
                              <img [src]="getSprite(trainerTeam[4])"
                                   class="img-fluid"
                                   placement="bottom"
                                   ngbTooltip="{{trainerTeam[4].text | translate }}">
                         }
                    </div>
                    <div class="pokemon-container rounded-3 col-3"
                         [ngClass]="(darkMode | async) ? 'border' : 'black-border shadow'">
                         @if (trainerTeam[5]?.sprite) {
                              <img [src]="getSprite(trainerTeam[5])"
                                   class="img-fluid"
                                   placement="bottom"
                                   ngbTooltip="{{trainerTeam[5].text | translate }}">
                         }
                    </div>
               </div>
               @if (showPower) {
               <div class="col-12 p-0 text-center">
                    <small class="text-warning fw-bold">Team Power: {{ teamPower }}</small>
               </div>
               }
               @if (showSort) {
               <div class="col-12 p-0 d-flex gap-1 justify-content-center">
                    <button class="btn btn-outline-warning btn-sm py-0" style="font-size: 0.7rem" (click)="sortByPower()">Sort: Power</button>
                    <button class="btn btn-outline-secondary btn-sm py-0" style="font-size: 0.7rem" (click)="sortByNewest()">Sort: Newest</button>
               </div>
               }
               <div class="col-12 p-0">
                    <app-storage-pc></app-storage-pc>
               </div>
          </div>
    </div>
</div>
